# Publish to npmjs.org on a vX.Y.Z tag push: tests → version check →
# npm publish via Trusted Publishing (OIDC) — no tokens in secrets,
# with provenance ("the package was built from this repo and this commit").
# Requires a one-time setup on npmjs.com: package → Settings →
# Trusted Publisher → GitHub Actions, repo avytheone/efmesh, release.yml.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # OIDC for trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Postgres on PATH
        run: ls -d /usr/lib/postgresql/*/bin 2>/dev/null | head -1 >> "$GITHUB_PATH" || true

      - name: Types
        run: bunx tsc --noEmit

      - name: Tests
        run: bun test

      - name: Tag version = package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(bun -e 'console.log(require("./package.json").version)')"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag v$TAG does not match package.json ($PKG)" >&2
            exit 1
          fi

      # npm >= 11.5 (OIDC) — take a fresh node
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish (dist-tag beta for pre-releases, latest for stable)
        run: |
          PKG="$(bun -e 'console.log(require("./package.json").version)')"
          case "$PKG" in
            *-*) DIST_TAG=beta ;;
            *)   DIST_TAG=latest ;;
          esac
          npm publish --access public --provenance --tag "$DIST_TAG"
