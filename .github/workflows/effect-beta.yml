# Early signal of Effect v4 drift: once a week run types and tests against
# the FRESH effect beta. Not a gate (the main CI is pinned by the lockfile) —
# a red run here means "time to look at what the new beta broke".
name: effect-beta-drift

on:
  schedule:
    - cron: "0 6 * * 1" # Monday, 06:00 UTC
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (pinned by the lockfile)
        run: bun install --frozen-lockfile

      - name: Bump effect to the fresh beta
        run: |
          bun add "effect@beta" "@effect/platform-bun@beta"
          bun -e 'console.log("effect:", require("effect/package.json").version)'

      - name: Postgres on PATH
        run: ls -d /usr/lib/postgresql/*/bin 2>/dev/null | head -1 >> "$GITHUB_PATH" || true

      - name: Types
        run: bunx tsc --noEmit

      - name: Tests
        run: bun test
