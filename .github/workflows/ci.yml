name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Postgres binaries exist in the image but are outside PATH; with them
      # the integration tests run too (initdb cluster), without them — skipIf
      - name: Postgres on PATH
        run: ls -d /usr/lib/postgresql/*/bin 2>/dev/null | head -1 >> "$GITHUB_PATH" || true

      # Lint + format check (biome) and types (tsc), same `check` script as local
      - name: Check
        run: bun run check

      - name: Tests
        run: bun test
